<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AB Chemicals V5 Enterprise</title>
<meta name="theme-color" content="#00337A">

<style>
:root{
--primary:#00337A;
--secondary:#0072CE;
--light:#F5F7FA;
}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--light)}
header{
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;padding:24px;
}
.container{max-width:1400px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:350px 1fr;gap:20px}
.card{
background:white;border-radius:16px;padding:20px;
box-shadow:0 2px 12px rgba(0,0,0,.08)
}
input,select,textarea{
width:100%;padding:12px;margin:6px 0;
border:1px solid #d6dce5;border-radius:10px
}
button{
background:var(--secondary);
color:white;border:none;padding:12px 16px;
border-radius:10px;cursor:pointer;margin:4px
}
.catalog{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:16px
}
.product{
background:white;border-radius:14px;padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
.product img{
width:100%;height:220px;object-fit:contain
}
.badge{
display:inline-block;background:#E8F3FF;
padding:5px 10px;border-radius:20px
}
@media(max-width:900px){
.grid{grid-template-columns:1fr}
.catalog{grid-template-columns:1fr}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
</head>
<body>

<header>
<h1>AB Chemicals Enterprise</h1>
<p>Catálogo Comercial Profissional • Supabase Ready • PDF Premium</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>Cadastro de Produto</h2>

<input id="codigo" placeholder="Código">
<input id="nome" placeholder="Nome do Produto">

<select id="categoria">
<option>Desengraxantes</option>
<option>Desinfetantes</option>
<option>Hospitalar</option>
<option>Lavanderia</option>
<option>Cozinha Industrial</option>
</select>

<input id="diluicao" placeholder="Diluição">
<input id="embalagem" placeholder="Embalagem">

<textarea id="descricao" placeholder="Descrição Técnica"></textarea>

<input type="file" id="imagem">

<button onclick="salvar()">Salvar Produto</button>
<button onclick="gerarPDF()">Gerar PDF Premium</button>
<button onclick="exportar()">Exportar JSON</button>

<hr>

<h3>Supabase</h3>
<input placeholder="SUPABASE_URL">
<input placeholder="SUPABASE_ANON_KEY">

</div>

<div>

<div class="card">
<h2>Catálogo Comercial</h2>
<input id="busca" placeholder="Pesquisar..." oninput="render()">
</div>

<div id="catalogo" class="catalog"></div>

</div>

</div>
</div>

<script>

const LOGO_BASE64 = "";

let produtos = JSON.parse(localStorage.getItem('ab_enterprise')||'[]');

function salvar(){

 const file=document.getElementById('imagem').files[0];

 const add=(img)=>{
   produtos.push({
      codigo:codigo.value,
      nome:nome.value,
      categoria:categoria.value,
      diluicao:diluicao.value,
      embalagem:embalagem.value,
      descricao:descricao.value,
      imagem:img||''
   });
   render();
 }

 if(file){
   const r=new FileReader();
   r.onload=()=>add(r.result);
   r.readAsDataURL(file);
 }else{
   add('');
 }
}

function render(){

 const termo=(document.getElementById('busca')?.value||'').toLowerCase();

 const lista=produtos.filter(p=>
      p.nome.toLowerCase().includes(termo) ||
      p.categoria.toLowerCase().includes(termo)
 );

 document.getElementById('catalogo').innerHTML=lista.map((p,i)=>`
 <div class="product">
 ${p.imagem?`<img src="${p.imagem}">`:''}
 <h3>${p.nome}</h3>
 <span class="badge">${p.categoria}</span>
 <p><b>Código:</b> ${p.codigo}</p>
 <p><b>Diluição:</b> ${p.diluicao}</p>
 <p><b>Embalagem:</b> ${p.embalagem}</p>
 <p>${p.descricao}</p>
 <button onclick="remover(${i})">Excluir</button>
 </div>`).join('');

 localStorage.setItem('ab_enterprise',JSON.stringify(produtos));
}

function remover(i){
 produtos.splice(i,1);
 render();
}

function exportar(){
 const blob=new Blob([JSON.stringify(produtos,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='abchemicals-enterprise.json';
 a.click();
}

function gerarPDF(){

 let content=[];

 if(LOGO_BASE64){
   content.push({
      image:LOGO_BASE64,
      width:180,
      alignment:'center',
      margin:[0,40,0,20]
   });
 }

 content.push({
   text:'AB CHEMICALS',
   style:'coverTitle',
   alignment:'center'
 });

 content.push({
   text:'Catálogo Comercial Profissional',
   alignment:'center',
   margin:[0,15,0,180]
 });

 content.push({text:'',pageBreak:'after'});

 content.push({text:'SUMÁRIO',style:'section'});

 produtos.forEach((p,index)=>{
   content.push({
      text:(index+1)+'. '+p.nome
   });
 });

 content.push({text:'',pageBreak:'after'});

 produtos.forEach((p,index)=>{

   content.push({
      text:p.nome,
      style:'productTitle'
   });

   if(p.imagem){
      content.push({
        image:p.imagem,
        width:220,
        alignment:'center',
        margin:[0,10,0,10]
      });
   }

   content.push({
      table:{
         widths:['*'],
         body:[
           [{text:'Ficha Técnica',fillColor:'#E8F3FF',bold:true}],
           ['Categoria: '+p.categoria],
           ['Código: '+p.codigo],
           ['Diluição: '+p.diluicao],
           ['Embalagem: '+p.embalagem],
           ['Descrição: '+p.descricao]
         ]
      }
   });

   if(index < produtos.length-1){
      content.push({text:'',pageBreak:'after'});
   }
 });

 const doc={
   pageSize:'A4',
   pageMargins:[40,50,40,60],
   footer:(current,pageCount)=>({
      text:'AB Chemicals • Página '+current+' de '+pageCount,
      alignment:'center'
   }),
   content,
   styles:{
      coverTitle:{fontSize:28,bold:true},
      section:{fontSize:20,bold:true},
      productTitle:{fontSize:18,bold:true,color:'#00337A'}
   }
 };

 pdfMake.createPdf(doc).download('AB_Chemicals_Catalogo_Enterprise.pdf');
}

render();

</script>
</body>
</html>
