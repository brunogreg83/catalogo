<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AB Chemicals V6 Enterprise</title>
<meta name="theme-color" content="#00337A">
<style>
:root{--p:#00337A;--s:#0072CE;--bg:#f4f7fb}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:var(--bg)}
header{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:20px}
.wrap{padding:20px;max-width:1400px;margin:auto}
.grid{display:grid;grid-template-columns:380px 1fr;gap:20px}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
input,select,textarea{width:100%;padding:12px;margin:6px 0;border:1px solid #d7dce5;border-radius:10px}
button{padding:12px 14px;border:none;border-radius:10px;background:var(--s);color:#fff;cursor:pointer;margin:4px}
.catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;margin-top:15px}
.prod{background:#fff;border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.prod img{width:100%;height:180px;object-fit:contain}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:15px}
.stat{background:#fff;padding:14px;border-radius:14px;text-align:center}
@media(max-width:900px){.grid,.stats{grid-template-columns:1fr}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
</head>
<body>
<header>
<h1>AB Chemicals V6 Enterprise</h1>
<p>CRUD • Busca • PDF • Importação/Exportação • Supabase Ready</p>
</header>

<div class="wrap">
<div class="stats">
<div class="stat"><h3 id="tProdutos">0</h3><small>Produtos</small></div>
<div class="stat"><h3 id="tCategorias">0</h3><small>Categorias</small></div>
<div class="stat"><h3>PDF</h3><small>Ativo</small></div>
<div class="stat"><h3>Mobile</h3><small>Ready</small></div>
</div>

<div class="grid">
<div class="card">
<h2>Produto</h2>
<input id="nome" placeholder="Nome">
<input id="codigo" placeholder="Código">
<select id="categoria">
<option>Desengraxantes</option>
<option>Desinfetantes</option>
<option>Hospitalar</option>
<option>Lavanderia</option>
</select>
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="file" id="imagem">
<input type="hidden" id="editIndex">

<button onclick="salvar()">Salvar</button>
<button onclick="limpar()">Novo</button>
<button onclick="exportar()">Exportar JSON</button>
<button onclick="gerarPDF()">Gerar PDF</button>
<input type="file" id="importar" accept=".json" onchange="importarJSON(event)">

<hr>
<h3>Supabase</h3>
<input placeholder="SUPABASE_URL">
<input placeholder="SUPABASE_ANON_KEY">
</div>

<div>
<div class="card">
<input id="busca" placeholder="Pesquisar produto..." oninput="render()">
</div>
<div id="catalogo" class="catalog"></div>
</div>
</div>
</div>

<script>
let produtos=JSON.parse(localStorage.getItem('ab_v6')||'[]');

function salvar(){
 const idx=document.getElementById('editIndex').value;
 const file=document.getElementById('imagem').files[0];

 const persist=(img)=>{
  const item={
   nome:nome.value,codigo:codigo.value,categoria:categoria.value,
   descricao:descricao.value,imagem:img
  };

  if(idx!==""){produtos[idx]=item;} else {produtos.push(item);}
  localStorage.setItem('ab_v6',JSON.stringify(produtos));
  limpar(); render();
 };

 if(file){
  const r=new FileReader();
  r.onload=()=>persist(r.result);
  r.readAsDataURL(file);
 }else{
  persist((idx!=="" && produtos[idx]) ? produtos[idx].imagem : "");
 }
}

function editar(i){
 const p=produtos[i];
 nome.value=p.nome; codigo.value=p.codigo;
 categoria.value=p.categoria; descricao.value=p.descricao;
 editIndex.value=i;
 window.scrollTo({top:0,behavior:'smooth'});
}

function excluir(i){
 if(confirm('Excluir produto?')){
  produtos.splice(i,1);
  localStorage.setItem('ab_v6',JSON.stringify(produtos));
  render();
 }
}

function limpar(){
 nome.value=''; codigo.value=''; descricao.value='';
 imagem.value=''; editIndex.value='';
}

function exportar(){
 const b=new Blob([JSON.stringify(produtos,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(b);
 a.download='abchemicals-v6.json';
 a.click();
}

function importarJSON(e){
 const f=e.target.files[0];
 if(!f) return;
 const r=new FileReader();
 r.onload=()=>{
   produtos=JSON.parse(r.result);
   localStorage.setItem('ab_v6',JSON.stringify(produtos));
   render();
 };
 r.readAsText(f);
}

function gerarPDF(){
 let c=[{text:'AB Chemicals - Catálogo Comercial',fontSize:22,bold:true}];
 produtos.forEach(p=>{
  c.push({text:p.nome,fontSize:16,bold:true,margin:[0,10,0,5]});
  c.push({text:'Código: '+p.codigo});
  c.push({text:'Categoria: '+p.categoria});
  c.push({text:p.descricao});
 });
 pdfMake.createPdf({
  content:c,
  footer:(n,t)=>({text:'Página '+n+' de '+t,alignment:'center'})
 }).download('AB_Chemicals_V6.pdf');
}

function render(){
 const t=(busca.value||'').toLowerCase();
 const lista=produtos.filter(p=>p.nome.toLowerCase().includes(t)||p.categoria.toLowerCase().includes(t));
 document.getElementById('tProdutos').innerText=produtos.length;
 document.getElementById('tCategorias').innerText=[...new Set(produtos.map(x=>x.categoria))].length;

 catalogo.innerHTML=lista.map((p,i)=>`
 <div class="prod">
 ${p.imagem?`<img src="${p.imagem}">`:''}
 <h3>${p.nome}</h3>
 <p>${p.codigo}</p>
 <p>${p.categoria}</p>
 <button onclick="editar(${i})">Editar</button>
 <button onclick="excluir(${i})">Excluir</button>
 </div>`).join('');
}
render();
</script>
</body>
</html>
