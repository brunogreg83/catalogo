<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AB Chemicals V7 Firebase</title>
<style>
:root{--p:#00337A;--a:#0072CE}
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fa}
header{background:linear-gradient(135deg,var(--p),var(--a));color:#fff;padding:20px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:350px 1fr;gap:20px}
input,textarea{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
button{background:var(--a);color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.item{border-bottom:1px solid #ddd;padding:10px 0}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>AB Chemicals</h1>
<p>Catálogo Firebase</p>
</header>

<div class="container">
<div class="grid">
<div class="card">
<h3>Produto</h3>
<input id="nome" placeholder="Nome">
<input id="codigo" placeholder="Código">
<textarea id="descricao" placeholder="Descrição"></textarea>
<button onclick="salvarProduto()">Salvar Produto</button>
</div>

<div class="card">
<h3>Catálogo</h3>
<div id="catalogo">Carregando...</div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8oIu9BJBmM2QMQHPKqIEegYtUny1uDJE",
  authDomain: "catalogo-68e13.firebaseapp.com",
  projectId: "catalogo-68e13",
  storageBucket: "catalogo-68e13.firebasestorage.app",
  messagingSenderId: "946056802788",
  appId: "1:946056802788:web:a9d30721fb48a7a85f57f1",
  measurementId: "G-ZQMSR4KWCT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarProduto = async function(){
  try{
    await addDoc(collection(db,'produtos'),{
      nome: document.getElementById('nome').value,
      codigo: document.getElementById('codigo').value,
      descricao: document.getElementById('descricao').value,
      createdAt: new Date().toISOString()
    });
    await carregarProdutos();
    alert('Produto salvo');
  }catch(e){ alert(e.message); }
}

async function carregarProdutos(){
  const snap = await getDocs(collection(db,'produtos'));
  document.getElementById('catalogo').innerHTML = snap.docs.map(d=>{
    const p=d.data();
    return `<div class="item"><strong>${p.nome||''}</strong><br>${p.codigo||''}<br>${p.descricao||''}</div>`;
  }).join('') || 'Nenhum produto cadastrado';
}

carregarProdutos();
</script>
</body>
</html>
