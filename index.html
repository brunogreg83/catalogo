<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AB Chemicals V4 Mobile</title>
<style>
:root{--primary:#00337A;--accent:#0072CE;--bg:#f3f6fa}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg)}
.sidebar{
position:fixed;left:0;top:0;width:260px;height:100vh;
background:var(--primary);color:#fff;padding:20px;overflow:auto
}
.sidebar a{
display:block;color:#fff;text-decoration:none;padding:12px;
margin:6px 0;border-radius:10px;background:rgba(255,255,255,.08)
}
.main{margin-left:260px;padding:16px}
.card{
background:#fff;border-radius:16px;padding:16px;
box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:16px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px
}
input,textarea,select{
width:100%;padding:12px;font-size:16px;
margin:6px 0;border:1px solid #d0d7de;border-radius:10px
}
button{
background:var(--accent);color:#fff;border:none;
padding:12px 16px;border-radius:10px;cursor:pointer;
margin:4px 0;width:100%
}
.catalog{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:12px
}
.product{
background:#fff;border-radius:14px;padding:12px
}
.product img{
width:100%;height:180px;object-fit:contain
}
.badge{
display:inline-block;padding:4px 10px;
background:#e8f2ff;border-radius:30px
}
.mobile-toggle{
display:none;position:fixed;top:10px;left:10px;
z-index:1000;background:var(--accent);color:#fff;
border:none;border-radius:10px;padding:10px 12px;width:auto
}

@media (max-width: 768px){
.sidebar{
transform:translateX(-100%);
transition:.3s;
z-index:999;
}
.sidebar.open{
transform:translateX(0);
}
.mobile-toggle{
display:block;
}
.main{
margin-left:0;
padding:60px 12px 12px;
}
.grid{
grid-template-columns:1fr;
}
.catalog{
grid-template-columns:1fr;
}
.card{
padding:14px;
}
h1,h2,h3{
word-break:break-word;
}
}
</style>
</head>
<body>

<button class="mobile-toggle" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
<h2>AB Chemicals</h2>
<a href="#">Dashboard</a>
<a href="#">Produtos</a>
<a href="#">Catálogo Público</a>
<a href="#">Relatórios</a>
<a href="#">Supabase</a>
</div>

<div class="main">
<div class="card">
<h1>AB Chemicals V4 Mobile</h1>
<p>Versão otimizada para celulares, tablets e desktop.</p>
</div>

<div class="grid">
<div class="card"><h3>Total Produtos</h3><h2 id="total">0</h2></div>
<div class="card"><h3>Status</h3><h2>Online</h2></div>
</div>

<div class="card">
<h2>Cadastro de Produto</h2>
<input id="codigo" placeholder="Código">
<input id="nome" placeholder="Nome do Produto">
<select id="categoria">
<option>Desengraxantes</option>
<option>Desinfetantes</option>
<option>Lavanderia</option>
<option>Hospitalar</option>
</select>
<input id="diluicao" placeholder="Diluição">
<input id="embalagem" placeholder="Embalagem">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="file" id="imagem">
<button onclick="salvar()">Salvar Produto</button>
</div>

<div class="card">
<input id="busca" placeholder="Pesquisar..." oninput="render()">
</div>

<div class="card">
<h2>Catálogo</h2>
<div id="catalog" class="catalog"></div>
</div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('abchem_mobile') || '[]');

function toggleMenu(){
 document.getElementById('sidebar').classList.toggle('open');
}

function render(){
 const termo=(document.getElementById('busca')?.value||'').toLowerCase();
 const lista=produtos.filter(p=>
  p.nome.toLowerCase().includes(termo) ||
  p.categoria.toLowerCase().includes(termo)
 );

 document.getElementById('total').innerText=produtos.length;

 document.getElementById('catalog').innerHTML=lista.map((p,i)=>`
 <div class="product">
 ${p.img?`<img src="${p.img}">`:''}
 <h3>${p.nome}</h3>
 <span class="badge">${p.categoria}</span>
 <p><b>Código:</b> ${p.codigo}</p>
 <p><b>Diluição:</b> ${p.diluicao}</p>
 <p><b>Embalagem:</b> ${p.embalagem}</p>
 <button onclick="excluir(${i})">Excluir</button>
 </div>`).join('');

 localStorage.setItem('abchem_mobile', JSON.stringify(produtos));
}

function salvar(){
 const file=document.getElementById('imagem').files[0];
 const add=(img)=>{
  produtos.push({
   codigo:codigo.value,
   nome:nome.value,
   categoria:categoria.value,
   diluicao:diluicao.value,
   embalagem:embalagem.value,
   descricao:descricao.value,
   img:img||''
  });
  render();
 }
 if(file){
  const r=new FileReader();
  r.onload=()=>add(r.result);
  r.readAsDataURL(file);
 }else{
  add('');
 }
}

function excluir(i){
 produtos.splice(i,1);
 render();
}

render();
</script>

</body>
</html>
