<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AB Chemicals — Catálogo</title>
<style>
:root{--p:#00337A;--a:#0072CE;--light:#e8f0fb;--success:#1a7a4a;--danger:#c0392b;--gray:#f5f7fa;--border:#dde3ed;--text:#1a1f2e;--muted:#6b7280;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray);color:var(--text);font-size:15px}

header{background:linear-gradient(135deg,var(--p),var(--a));color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,51,122,.25)}
header h1{font-size:1.3rem;font-weight:700}
header p{font-size:.8rem;opacity:.8;margin-top:2px}

nav{background:#fff;border-bottom:1px solid var(--border);display:flex}
.nav-btn{padding:12px 22px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;transition:.2s}
.nav-btn.active{color:var(--a);border-bottom-color:var(--a)}

.container{max-width:960px;margin:auto;padding:28px 20px}
.page{display:none}.page.active{display:block}

.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:16px}
.card-title{font-size:1rem;font-weight:600;color:var(--p);margin-bottom:20px}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
input,textarea{border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:.92rem;font-family:inherit;transition:.2s;background:#fff;color:var(--text);width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--a);box-shadow:0 0 0 3px rgba(0,114,206,.12)}
textarea{resize:vertical;min-height:90px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.18s;border:1.5px solid transparent}
.btn-primary{background:var(--a);color:#fff;border-color:var(--a)}
.btn-primary:hover{background:#005fa8}
.btn-outline{background:#fff;color:var(--a);border-color:var(--a)}
.btn-outline:hover{background:var(--light)}
.btn-danger{background:#fff;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:#fde8e8}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1}

.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.product-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:.2s;display:flex;flex-direction:column}
.product-card:hover{box-shadow:0 4px 16px rgba(0,51,122,.12);transform:translateY(-2px)}
.product-img{height:110px;background:linear-gradient(135deg,var(--light),#c8ddf5);display:flex;align-items:center;justify-content:center;font-size:2.6rem}
.product-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:5px}
.product-name{font-size:.97rem;font-weight:700}
.meta-row{font-size:.8rem;color:var(--muted);line-height:1.5}
.meta-label{font-weight:600;color:var(--p)}
.product-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:#fafbfc}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:var(--light);color:var(--p);font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:hover{background:#f9fbff}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:26px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-header h3{font-size:1.05rem;font-weight:700;color:var(--p)}

.ficha-row{display:flex;flex-direction:column;gap:3px;padding:10px 0;border-bottom:1px solid var(--border)}
.ficha-row:last-child{border:none}
.ficha-key{font-size:.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ficha-val{font-size:.88rem;color:var(--text);line-height:1.55}

.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;color:#fff;font-weight:600;font-size:.85rem;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

.loader{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--muted)}
.spinner{width:22px;height:22px;border:3px solid var(--light);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}

@media(max-width:600px){nav{overflow-x:auto}.nav-btn{white-space:nowrap}}
</style>
</head>
<body>

<header>
  <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
    <rect width="34" height="34" rx="8" fill="rgba(255,255,255,.15)"/>
    <path d="M9 25 L17 9 L25 25 M12.5 19 h9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>
    <h1>AB Chemicals</h1>
    <p>Catálogo de Produtos</p>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showPage('catalogo',this)">🧪 Catálogo</button>
  <button class="nav-btn" onclick="showPage('cadastro',this)">➕ Cadastrar</button>
  <button class="nav-btn" onclick="showPage('lista',this)">📋 Gestão</button>
</nav>

<div class="container">

  <!-- CATÁLOGO -->
  <div id="page-catalogo" class="page active">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍  Buscar produto..." oninput="filtrarProdutos()">
    </div>
    <div id="catalogoGrid" class="catalog-grid">
      <div class="loader"><div class="spinner"></div> Carregando...</div>
    </div>
  </div>

  <!-- CADASTRO -->
  <div id="page-cadastro" class="page">
    <div class="card">
      <div class="card-title">Cadastrar Produto</div>

      <div class="field">
        <label>Produto *</label>
        <input id="f_nome" placeholder="Nome do produto">
      </div>
      <div class="field">
        <label>Embalagem</label>
        <input id="f_embalagem" placeholder="Ex: Frasco 1L, Galão 5L, Saco 25kg...">
      </div>
      <div class="field">
        <label>Diluição</label>
        <input id="f_diluicao" placeholder="Ex: 1:10 em água, 5%, Concentrado puro...">
      </div>
      <div class="field">
        <label>Aplicação</label>
        <textarea id="f_aplicacao" placeholder="Descreva as aplicações e usos do produto..."></textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap">
        <button class="btn btn-primary" id="btnSalvar" onclick="salvarProduto()">💾 Salvar Produto</button>
        <button class="btn btn-outline" onclick="limparForm()">Limpar</button>
      </div>
    </div>
  </div>

  <!-- GESTÃO -->
  <div id="page-lista" class="page">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="card-title" style="margin:0">📋 Todos os Produtos</div>
        <input type="text" id="listaSearch" placeholder="🔍 Filtrar..." oninput="filtrarLista()" style="width:220px">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Embalagem</th>
              <th>Diluição</th>
              <th>Aplicação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaBody">
            <tr><td colspan="5" style="text-align:center;padding:30px"><div class="spinner" style="margin:auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalProd">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Ficha do Produto</h3>
      <button class="btn btn-sm btn-outline" onclick="fecharModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8oIu9BJBmM2QMQHPKqIEegYtUny1uDJE",
  authDomain: "catalogo-68e13.firebaseapp.com",
  projectId: "catalogo-68e13",
  storageBucket: "catalogo-68e13.firebasestorage.app",
  messagingSenderId: "946056802788",
  appId: "1:946056802788:web:a9d30721fb48a7a85f57f1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let produtos = [];
let editandoId = null;

window.showToast = (msg, tipo='success') => {
  const t = document.getElementById('toast');
  t.className = `toast ${tipo} show`;
  t.textContent = (tipo==='success'?'✓ ':'✕ ') + msg;
  setTimeout(()=>t.className='toast', 3000);
};

window.salvarProduto = async () => {
  const nome = document.getElementById('f_nome').value.trim();
  if(!nome){ showToast('Informe o nome do produto','error'); return; }
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const dados = {
    nome,
    embalagem: document.getElementById('f_embalagem').value.trim(),
    diluicao:  document.getElementById('f_diluicao').value.trim(),
    aplicacao: document.getElementById('f_aplicacao').value.trim(),
  };

  try {
    if(editandoId){
      await updateDoc(doc(db,'produtos',editandoId), dados);
      showToast('Produto atualizado!');
      editandoId = null;
    } else {
      dados.createdAt = new Date().toISOString();
      await addDoc(collection(db,'produtos'), dados);
      showToast('Produto cadastrado!');
    }
    limparForm();
    await carregar();
    showPage('catalogo', document.querySelector('.nav-btn'));
  } catch(e){ showToast('Erro: '+e.message,'error'); }

  btn.disabled = false; btn.textContent = '💾 Salvar Produto';
};

async function carregar(){
  try {
    const snap = await getDocs(query(collection(db,'produtos'), orderBy('createdAt','desc')));
    produtos = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCatalogo(produtos);
    renderTabela(produtos);
  } catch(e){
    document.getElementById('catalogoGrid').innerHTML = `<div class="empty">Erro ao carregar: ${e.message}</div>`;
  }
}

function renderCatalogo(lista){
  const g = document.getElementById('catalogoGrid');
  if(!lista.length){ g.innerHTML='<div class="empty">🧪 Nenhum produto encontrado</div>'; return; }
  g.innerHTML = lista.map(p=>`
    <div class="product-card">
      <div class="product-img">🧪</div>
      <div class="product-body">
        <div class="product-name">${p.nome}</div>
        ${p.embalagem?`<div class="meta-row"><span class="meta-label">Embalagem:</span> ${p.embalagem}</div>`:''}
        ${p.diluicao?`<div class="meta-row"><span class="meta-label">Diluição:</span> ${p.diluicao}</div>`:''}
        ${p.aplicacao?`<div class="meta-row" style="flex:1">${p.aplicacao.substring(0,90)}${p.aplicacao.length>90?'…':''}</div>`:''}
      </div>
      <div class="product-footer">
        <button class="btn btn-outline btn-sm" onclick="verProduto('${p.id}')">📄 Ver</button>
        <button class="btn btn-primary btn-sm" onclick="editarProduto('${p.id}')">✏️ Editar</button>
      </div>
    </div>`).join('');
}

function renderTabela(lista){
  const b = document.getElementById('tabelaBody');
  if(!lista.length){ b.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">Nenhum produto</td></tr>'; return; }
  b.innerHTML = lista.map(p=>`
    <tr>
      <td><strong>${p.nome}</strong></td>
      <td>${p.embalagem||'—'}</td>
      <td>${p.diluicao||'—'}</td>
      <td style="max-width:200px">${p.aplicacao||'—'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="verProduto('${p.id}')">📄</button>
          <button class="btn btn-outline btn-sm" onclick="editarProduto('${p.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deletarProduto('${p.id}','${p.nome.replace(/'/g,'')}')">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}

window.filtrarProdutos = () => {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderCatalogo(produtos.filter(p=>[p.nome,p.embalagem,p.diluicao,p.aplicacao].some(v=>v&&v.toLowerCase().includes(q))));
};

window.filtrarLista = () => {
  const q = document.getElementById('listaSearch').value.toLowerCase();
  renderTabela(produtos.filter(p=>[p.nome,p.embalagem,p.diluicao,p.aplicacao].some(v=>v&&v.toLowerCase().includes(q))));
};

window.verProduto = (id) => {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  document.getElementById('modalTitle').textContent = p.nome;
  const row = (k,v) => v ? `<div class="ficha-row"><div class="ficha-key">${k}</div><div class="ficha-val">${v}</div></div>` : '';
  document.getElementById('modalBody').innerHTML =
    row('Embalagem', p.embalagem) +
    row('Diluição', p.diluicao) +
    row('Aplicação', p.aplicacao) +
    `<div style="display:flex;gap:8px;margin-top:18px">
      <button class="btn btn-primary btn-sm" onclick="editarProduto('${p.id}');fecharModal()">✏️ Editar</button>
      <button class="btn btn-outline btn-sm" onclick="fecharModal()">Fechar</button>
    </div>`;
  document.getElementById('modalProd').classList.add('open');
};

window.fecharModal = () => document.getElementById('modalProd').classList.remove('open');
document.getElementById('modalProd').addEventListener('click', e=>{ if(e.target===e.currentTarget) fecharModal(); });

window.editarProduto = (id) => {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  editandoId = id;
  document.getElementById('f_nome').value      = p.nome||'';
  document.getElementById('f_embalagem').value = p.embalagem||'';
  document.getElementById('f_diluicao').value  = p.diluicao||'';
  document.getElementById('f_aplicacao').value = p.aplicacao||'';
  document.getElementById('btnSalvar').textContent = '💾 Atualizar Produto';
  showPage('cadastro', document.querySelectorAll('.nav-btn')[1]);
  window.scrollTo({top:0,behavior:'smooth'});
};

window.deletarProduto = async (id, nome) => {
  if(!confirm(`Excluir "${nome}"?`)) return;
  try { await deleteDoc(doc(db,'produtos',id)); showToast('Produto excluído'); await carregar(); }
  catch(e){ showToast('Erro: '+e.message,'error'); }
};

window.limparForm = () => {
  ['f_nome','f_embalagem','f_diluicao','f_aplicacao'].forEach(id=>document.getElementById(id).value='');
  editandoId = null;
  document.getElementById('btnSalvar').textContent = '💾 Salvar Produto';
};

window.showPage = (nome, btn) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+nome).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
};

carregar();
</script>
</body>
</html>
