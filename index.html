<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AB Chemicals — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#00337A;--a:#0072CE;--light:#e8f0fb;
  --success:#1a7a4a;--danger:#c0392b;
  --gray:#f0f4f9;--border:#dde3ed;
  --text:#1a1f2e;--muted:#6b7280;
  --cat-piso:#16a34a;--cat-piso-bg:#dcfce7;
  --cat-coz:#ea580c;--cat-coz-bg:#ffedd5;
  --cat-lav:#2563eb;--cat-lav-bg:#dbeafe;
  --cat-ins:#7c3aed;--cat-ins-bg:#ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--gray);color:var(--text);font-size:15px}

/* HEADER */
header{background:linear-gradient(135deg,#001f4d 0%,#0072CE 100%);color:#fff;padding:0 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,31,77,.35);height:64px}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center}
header h1{font-size:1.15rem;font-weight:800;letter-spacing:.3px}
header p{font-size:.72rem;opacity:.7;margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-pdf-header{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.btn-pdf-header:hover{background:rgba(255,255,255,.25)}

/* NAV */
nav{background:#fff;border-bottom:1px solid var(--border);display:flex}
.nav-btn{padding:13px 22px;border:none;background:none;cursor:pointer;font-size:.83rem;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
.nav-btn.active{color:var(--a);border-bottom-color:var(--a);font-weight:600}

.container{max-width:1100px;margin:auto;padding:28px 20px}
.page{display:none}.page.active{display:block}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px}
.search-bar select{min-width:190px}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-tab{padding:7px 18px;border-radius:30px;font-size:.82rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:.2s}
.cat-tab.all{background:#e8f0fb;color:var(--p);border-color:transparent}
.cat-tab.all.active{background:var(--p);color:#fff}
.cat-tab.piso{background:var(--cat-piso-bg);color:var(--cat-piso)}
.cat-tab.piso.active{background:var(--cat-piso);color:#fff}
.cat-tab.cozinha{background:var(--cat-coz-bg);color:var(--cat-coz)}
.cat-tab.cozinha.active{background:var(--cat-coz);color:#fff}
.cat-tab.lavanderia{background:var(--cat-lav-bg);color:var(--cat-lav)}
.cat-tab.lavanderia.active{background:var(--cat-lav);color:#fff}
.cat-tab.institucional{background:var(--cat-ins-bg);color:var(--cat-ins)}
.cat-tab.institucional.active{background:var(--cat-ins);color:#fff}

/* PRODUCT CARDS */
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}

.product-card{background:#fff;border-radius:16px;overflow:hidden;transition:.22s;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.product-card:hover{box-shadow:0 8px 28px rgba(0,51,122,.14);transform:translateY(-3px)}

.product-header{height:120px;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;position:relative;overflow:hidden}
.product-header::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;opacity:.15;background:#fff}
.product-header::after{content:'';position:absolute;right:20px;bottom:-30px;width:70px;height:70px;border-radius:50%;opacity:.1;background:#fff}
.ph-piso{background:linear-gradient(135deg,#15803d,#22c55e)}
.ph-cozinha{background:linear-gradient(135deg,#c2410c,#f97316)}
.ph-lavanderia{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.ph-institucional{background:linear-gradient(135deg,#6d28d9,#a855f7)}
.ph-default{background:linear-gradient(135deg,#0369a1,#0ea5e9)}

.product-icon{font-size:2.4rem;z-index:1}
.product-cat-label{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.9);background:rgba(0,0,0,.2);padding:3px 10px;border-radius:20px;z-index:1;text-transform:uppercase;letter-spacing:.8px}

.product-body{padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:0}
.product-name{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.3}

.info-chip{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9}
.info-chip:last-of-type{border:none}
.chip-icon{font-size:.9rem;margin-top:1px;flex-shrink:0}
.chip-content{}
.chip-label{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block}
.chip-val{font-size:.83rem;color:var(--text);line-height:1.45;display:block}

.product-footer{padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px;background:#fafbfd}

/* FORM */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:26px;margin-bottom:16px}
.card-title{font-size:1rem;font-weight:700;color:var(--p);margin-bottom:22px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
label{font-size:.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
input,textarea,select{border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:.92rem;font-family:'Inter',sans-serif;transition:.2s;background:#fff;color:var(--text);width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--a);box-shadow:0 0 0 3px rgba(0,114,206,.12)}
textarea{resize:vertical;min-height:90px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9px;font-size:.86rem;font-weight:600;cursor:pointer;transition:.18s;border:1.5px solid transparent;font-family:'Inter',sans-serif}
.btn-primary{background:var(--a);color:#fff;border-color:var(--a)}
.btn-primary:hover{background:#005fa8}
.btn-outline{background:#fff;color:var(--a);border-color:var(--a)}
.btn-outline:hover{background:var(--light)}
.btn-danger{background:#fff;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:#fde8e8}
.btn-sm{padding:6px 12px;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pdf{background:linear-gradient(135deg,#c2410c,#f97316);color:#fff;border:none;padding:10px 20px;border-radius:9px;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.2s;font-family:'Inter',sans-serif}
.btn-pdf:hover{filter:brightness(1.08)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{background:var(--light);color:var(--p);font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:hover{background:#f9fbff}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:0;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.modal-hero{height:140px;display:flex;align-items:flex-end;padding:20px;position:relative}
.modal-hero-icon{font-size:3rem;position:absolute;top:50%;left:50%;transform:translate(-50%,-60%)}
.modal-body-pad{padding:22px 24px}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-header h3{font-size:1.1rem;font-weight:700;color:var(--text)}
.ficha-row{padding:10px 0;border-bottom:1px solid #f1f5f9}
.ficha-row:last-child{border:none}
.ficha-key{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ficha-val{font-size:.88rem;color:var(--text);line-height:1.55}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:13px 20px;border-radius:12px;color:#fff;font-weight:600;font-size:.84rem;z-index:300;opacity:0;transition:.3s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.success{background:#15803d}
.toast.error{background:var(--danger)}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
.spinner{width:24px;height:24px;border:3px solid var(--light);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* PDF MODAL */
.pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}
.pdf-overlay.open{display:flex}
.pdf-box{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.pdf-box h3{font-size:1.05rem;font-weight:700;color:var(--p);margin-bottom:6px}
.pdf-box p{font-size:.85rem;color:var(--muted);margin-bottom:20px}
.pdf-options{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.pdf-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s}
.pdf-opt:hover{border-color:var(--a);background:var(--light)}
.pdf-opt.selected{border-color:var(--a);background:var(--light)}
.pdf-opt input{width:auto;margin:0}

/* BADGE CAT */
.badge-cat{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.cat-piso{background:var(--cat-piso-bg);color:var(--cat-piso)}
.cat-cozinha{background:var(--cat-coz-bg);color:var(--cat-coz)}
.cat-lavanderia{background:var(--cat-lav-bg);color:var(--cat-lav)}
.cat-institucional{background:var(--cat-ins-bg);color:var(--cat-ins)}

/* UPLOAD FOTO */
.foto-upload{border:2px dashed var(--border);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;background:#fafbfd}
.foto-upload:hover{border-color:var(--a);background:var(--light)}
.foto-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.foto-upload-icon{font-size:2rem;margin-bottom:6px}
.foto-upload p{font-size:.82rem;color:var(--muted);margin:0}
.foto-preview-wrap{position:relative;text-align:center}
.foto-preview{width:100%;max-height:200px;object-fit:contain;border-radius:10px;border:1px solid var(--border);background:#f8fafc;display:block}
.foto-remove{position:absolute;top:6px;right:6px;background:rgba(192,57,43,.9);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;z-index:2}
@media(max-width:600px){nav{overflow-x:auto}.catalog-grid{grid-template-columns:1fr}}
</style>
</head>

const app = initializeApp(firebaseConfig);

let tabAtiva = '';
let fotoBase64 = '';

// ── FOTO UPLOAD ──
window.previewFoto = (input) => {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ showToast('Foto muito grande. Use até 2MB.','error'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    fotoBase64 = e.target.result;
    document.getElementById('fotoPreview').src = fotoBase64;
    document.getElementById('fotoPlaceholder').style.display = 'none';
    document.getElementById('fotoPreviewWrap').style.display = 'block';
    document.getElementById('fotoUploadArea').style.border = '2px solid var(--a)';
  };
  reader.readAsDataURL(file);
};

window.removerFoto = (e) => {
  e.stopPropagation();
  fotoBase64 = '';
  document.getElementById('f_foto').value = '';
  document.getElementById('fotoPreview').src = '';
  document.getElementById('fotoPlaceholder').style.display = 'block';
  document.getElementById('fotoPreviewWrap').style.display = 'none';
  document.getElementById('fotoUploadArea').style.border = '2px dashed var(--border)';
};

  Institucional:{bg:'#6d28d9',light:'#ede9fe',text:'#3b0764',icon:'🏢'},
};
const catColor = cat => CAT_COLORS[cat] || {bg:'#0369a1',light:'#e0f2fe',text:'#0c4a6e',icon:'🧪'};

function catBadge(cat){
  if(!cat) return '';
  const k = {Piso:'piso',Cozinha:'cozinha',Lavanderia:'lavanderia',Institucional:'institucional'}[cat]||'';
  return `<span class="badge-cat cat-${k}">${cat}</span>`;
}

window.showToast = (msg,tipo='success')=>{
  const t=document.getElementById('toast');
  t.className=`toast ${tipo} show`;
  t.innerHTML=(tipo==='success'?'✓ ':'✕ ')+msg;
  setTimeout(()=>t.className='toast',3000);
};

// ── SALVAR ──
window.salvarProduto = async()=>{
  const nome=document.getElementById('f_nome').value.trim();
  if(!nome){showToast('Informe o nome do produto','error');return;}
  const btn=document.getElementById('btnSalvar');
  btn.disabled=true;btn.textContent='Salvando...';
  const dados={
    nome,
    categoria:document.getElementById('f_categoria').value,
    embalagem:document.getElementById('f_embalagem').value.trim(),
    diluicao:document.getElementById('f_diluicao').value.trim(),
    aplicacao:document.getElementById('f_aplicacao').value.trim(),
    foto: fotoBase64 || '',
  };
  try{
    if(editandoId){
      await updateDoc(doc(db,'produtos',editandoId),dados);
      showToast('Produto atualizado!'); editandoId=null;
    }else{
      dados.createdAt=new Date().toISOString();
      await addDoc(collection(db,'produtos'),dados);
      showToast('Produto cadastrado!');
    }
    limparForm(); await carregar();
    showPage('catalogo',document.querySelector('.nav-btn'));
  }catch(e){showToast('Erro: '+e.message,'error');}
  btn.disabled=false;btn.textContent='💾 Salvar Produto';
};

// ── CARREGAR ──
async function carregar(){
  try{
    const snap=await getDocs(query(collection(db,'produtos'),orderBy('createdAt','desc')));
    produtos=snap.docs.map(d=>({id:d.id,...d.data()}));
    aplicarFiltros(); renderTabela(produtos);
  }catch(e){
    document.getElementById('catalogoGrid').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>Erro: ${e.message}</p></div>`;
  }
}

// ── RENDER CATÁLOGO ──
function renderCatalogo(lista){
  const g=document.getElementById('catalogoGrid');
  if(!lista.length){g.innerHTML='<div class="empty"><div class="empty-icon">🧪</div><p>Nenhum produto encontrado</p></div>';return;}
  g.innerHTML=lista.map(p=>{
    const c=catColor(p.categoria);
    const headerContent = p.foto
      ? `<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover;display:block" alt="${p.nome}">`
      : `<span class="product-icon" style="font-size:2.4rem;z-index:1">${c.icon}</span>${p.categoria?`<span class="product-cat-label">${p.categoria}</span>`:''}`;
    return `<div class="product-card">
      <div class="product-header" style="background:${p.foto?'#f1f5f9':'linear-gradient(135deg,'+c.bg+'dd,'+c.bg+'99)'};${p.foto?'padding:0;overflow:hidden':''}">
        ${headerContent}
        ${p.foto&&p.categoria?`<span class="product-cat-label" style="position:absolute;top:8px;right:8px">${p.categoria}</span>`:''}
      </div>
      <div class="product-body">
        <div class="product-name">${p.nome}</div>
        ${p.embalagem?`<div class="info-chip"><span class="chip-icon">📦</span><div class="chip-content"><span class="chip-label">Embalagem</span><span class="chip-val">${p.embalagem}</span></div></div>`:''}
        ${p.diluicao?`<div class="info-chip"><span class="chip-icon">💧</span><div class="chip-content"><span class="chip-label">Diluição</span><span class="chip-val">${p.diluicao}</span></div></div>`:''}
        ${p.aplicacao?`<div class="info-chip"><span class="chip-icon">✅</span><div class="chip-content"><span class="chip-label">Aplicação</span><span class="chip-val">${p.aplicacao.substring(0,100)}${p.aplicacao.length>100?'…':''}</span></div></div>`:''}
      </div>
      <div class="product-footer">
        <button class="btn btn-outline btn-sm" onclick="verProduto('${p.id}')">📄 Ver ficha</button>
        <button class="btn btn-primary btn-sm" onclick="editarProduto('${p.id}')">✏️ Editar</button>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER TABELA ──
function renderTabela(lista){
  const b=document.getElementById('tabelaBody');
  if(!lista.length){b.innerHTML='<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">Nenhum produto</td></tr>';return;}
  b.innerHTML=lista.map(p=>`<tr>
    <td><strong>${p.nome}</strong></td>
    <td>${catBadge(p.categoria)||'—'}</td>
    <td>${p.embalagem||'—'}</td>
    <td>${p.diluicao||'—'}</td>
    <td style="max-width:180px;font-size:.82rem">${p.aplicacao||'—'}</td>
    <td><div style="display:flex;gap:5px">
      <button class="btn btn-outline btn-sm" onclick="verProduto('${p.id}')">📄</button>
      <button class="btn btn-outline btn-sm" onclick="editarProduto('${p.id}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deletarProduto('${p.id}','${p.nome.replace(/'/g,'')}')">🗑️</button>
    </div></td>
  </tr>`).join('');
}

// ── FILTROS ──
function aplicarFiltros(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('filterCat').value||tabAtiva;
  renderCatalogo(produtos.filter(p=>{
    const mq=!q||[p.nome,p.embalagem,p.diluicao,p.aplicacao].some(v=>v&&v.toLowerCase().includes(q));
    const mc=!cat||p.categoria===cat;
    return mq&&mc;
  }));
}
window.filtrarProdutos=aplicarFiltros;

window.setTab=(cat,el)=>{
  tabAtiva=cat;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filterCat').value=cat;
  aplicarFiltros();
};

window.filtrarLista=()=>{
  const q=document.getElementById('listaSearch').value.toLowerCase();
  const cat=document.getElementById('listaFilterCat').value;
  renderTabela(produtos.filter(p=>{
    const mq=!q||[p.nome,p.embalagem,p.diluicao,p.aplicacao].some(v=>v&&v.toLowerCase().includes(q));
    return mq&&(!cat||p.categoria===cat);
  }));
};

// ── VER PRODUTO ──
window.verProduto=(id)=>{
  const p=produtos.find(x=>x.id===id);if(!p)return;
  const c=catColor(p.categoria);
  const heroEl = document.getElementById('modalHero');
  if(p.foto){
    heroEl.style.background='#f1f5f9';
    heroEl.style.padding='0';
    heroEl.style.overflow='hidden';
    heroEl.innerHTML=`<img src="${p.foto}" style="width:100%;height:100%;object-fit:contain;display:block" alt="${p.nome}">`;
  } else {
    heroEl.style.background=`linear-gradient(135deg,${c.bg},${c.bg}99)`;
    heroEl.style.padding='20px';
    heroEl.style.overflow='';
    heroEl.innerHTML=`<div class="modal-hero-icon">${c.icon}</div>`;
  }
  document.getElementById('modalTitle').textContent=p.nome;
  const row=(k,v)=>v?`<div class="ficha-row"><div class="ficha-key">${k}</div><div class="ficha-val">${v}</div></div>`:'';
  document.getElementById('modalBody').innerHTML=
    (p.categoria?`<div style="margin-bottom:14px">${catBadge(p.categoria)}</div>`:'')+
    row('Embalagem',p.embalagem)+row('Diluição',p.diluicao)+row('Aplicação',p.aplicacao)+
    `<div style="display:flex;gap:8px;margin-top:18px">
      <button class="btn btn-primary btn-sm" onclick="editarProduto('${p.id}');fecharModal()">✏️ Editar</button>
      <button class="btn btn-outline btn-sm" onclick="fecharModal()">Fechar</button>
    </div>`;
  document.getElementById('modalProd').classList.add('open');
};
window.fecharModal=()=>document.getElementById('modalProd').classList.remove('open');
document.getElementById('modalProd').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharModal();});

// ── EDITAR ──
window.editarProduto=(id)=>{
  const p=produtos.find(x=>x.id===id);if(!p)return;
  editandoId=id;
  document.getElementById('f_nome').value=p.nome||'';
  document.getElementById('f_categoria').value=p.categoria||'';
  document.getElementById('f_embalagem').value=p.embalagem||'';
  document.getElementById('f_diluicao').value=p.diluicao||'';
  document.getElementById('f_aplicacao').value=p.aplicacao||'';
  // foto
  fotoBase64 = p.foto || '';
  if(fotoBase64){
    document.getElementById('fotoPreview').src = fotoBase64;
    document.getElementById('fotoPlaceholder').style.display = 'none';
    document.getElementById('fotoPreviewWrap').style.display = 'block';
    document.getElementById('fotoUploadArea').style.border = '2px solid var(--a)';
  } else {
    removerFoto({stopPropagation:()=>{}});
  }
  document.getElementById('btnSalvar').textContent='💾 Atualizar Produto';
  showPage('cadastro',document.querySelectorAll('.nav-btn')[1]);
  window.scrollTo({top:0,behavior:'smooth'});
};

window.deletarProduto=async(id,nome)=>{
  if(!confirm(`Excluir "${nome}"?`))return;
  try{await deleteDoc(doc(db,'produtos',id));showToast('Produto excluído');await carregar();}
  catch(e){showToast('Erro: '+e.message,'error');}
};

window.limparForm=()=>{
  ['f_nome','f_categoria','f_embalagem','f_diluicao','f_aplicacao'].forEach(id=>document.getElementById(id).value='');
  removerFoto({stopPropagation:()=>{}});
  editandoId=null;
  document.getElementById('btnSalvar').textContent='💾 Salvar Produto';
};

window.showPage=(nome,btn)=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+nome).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
};

// ── PDF MODAL ──
window.abrirPdfModal=()=>document.getElementById('pdfOverlay').classList.add('open');
window.fecharPdfModal=()=>document.getElementById('pdfOverlay').classList.remove('open');
window.selecionarOpt=(el)=>{
  document.querySelectorAll('.pdf-opt').forEach(o=>o.classList.remove('selected'));
  el.closest('.pdf-opt').classList.add('selected');
};

// ── GERAR PDF ──
window.gerarPDF=()=>{
  const sel=document.querySelector('input[name="pdfcat"]:checked').value;
  const lista=sel==='todos'?produtos:produtos.filter(p=>p.categoria===sel);
  if(!lista.length){showToast('Nenhum produto nessa categoria','error');return;}

  const btn=document.getElementById('btnGerarPdf');
  btn.textContent='Gerando...';btn.disabled=true;

  setTimeout(()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const W=210,H=297,mg=14;
      let y=0;

      const CAT_HEX={
        Piso:'#15803d',Cozinha:'#c2410c',
        Lavanderia:'#1d4ed8',Institucional:'#6d28d9',
        default:'#0369a1'
      };

      const hexToRgb=hex=>{
        const r=parseInt(hex.slice(1,3),16);
        const g=parseInt(hex.slice(3,5),16);
        const b=parseInt(hex.slice(5,7),16);
        return[r,g,b];
      };

      const novaPage=()=>{
        doc.addPage();
        y=0;
        // rodapé
        try{ doc.addImage(LOGO_B64,'PNG',mg,H-14,18,11,'logofoot','FAST'); }catch(e){}
        doc.setFontSize(8);doc.setTextColor(160,160,160);
        doc.text('AB Chemicals — Soluções em Limpeza Profissional',W/2,H-7,{align:'center'});
        doc.text(`Página ${doc.getNumberOfPages()}`,W-mg,H-7,{align:'right'});
      };

      // ── CAPA ──
      // fundo azul escuro
      doc.setFillColor(0,31,77);
      doc.rect(0,0,W,H,'F');

      // faixa lateral decorativa
      doc.setFillColor(0,114,206);
      doc.rect(0,0,8,H,'F');

      // círculos decorativos
      doc.setFillColor(0,60,140);
      doc.circle(W-30,40,50,'F');
      doc.setFillColor(0,80,170);
      doc.circle(W,H-20,70,'F');

      // logo imagem na capa
      try{
        doc.addImage(LOGO_B64,'PNG',mg+10,62,90,55,'logo','FAST');
      }catch(e){
        doc.setFont('helvetica','bold');
        doc.setFontSize(42);doc.setTextColor(255,255,255);
        doc.text('AB',mg+10,90);
        doc.setFontSize(22);doc.setTextColor(0,160,255);
        doc.text('CHEMICALS',mg+10,104);
      }

      // linha decorativa
      doc.setDrawColor(0,114,206);doc.setLineWidth(1);
      doc.line(mg+10,110,W-mg-10,110);

      // subtítulo
      doc.setFontSize(13);doc.setTextColor(180,210,255);doc.setFont('helvetica','normal');
      doc.text('Linha Profissional de Limpeza e Higienização',mg+10,120);

      // label catálogo
      const labelCat=sel==='todos'?'Catálogo Completo':'Catálogo: '+sel;
      doc.setFillColor(0,114,206);
      doc.roundedRect(mg+10,132,100,12,3,3,'F');
      doc.setFontSize(11);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');
      doc.text(labelCat,mg+60,140,{align:'center'});

      // data
      const hoje=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      doc.setFontSize(9);doc.setTextColor(130,170,220);doc.setFont('helvetica','normal');
      doc.text(hoje,mg+10,152);

      // total produtos
      doc.setFontSize(32);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');
      doc.text(String(lista.length),mg+10,H-60);
      doc.setFontSize(11);doc.setTextColor(130,170,220);doc.setFont('helvetica','normal');
      doc.text('produtos neste catálogo',mg+10,H-52);

      // rodapé capa
      doc.setFontSize(8);doc.setTextColor(80,120,180);
      doc.text('Documento gerado exclusivamente para apresentação comercial.',mg+10,H-10);

      // ── CATEGORIAS SEPARADORAS + PRODUTOS ──
      const grupos={};
      lista.forEach(p=>{const c=p.categoria||'Geral';if(!grupos[c])grupos[c]=[];grupos[c].push(p);});

      Object.keys(grupos).forEach(cat=>{
        novaPage();

        // cabeçalho de seção
        const cor=CAT_HEX[cat]||CAT_HEX.default;
        const [r,g,b]=hexToRgb(cor);
        doc.setFillColor(r,g,b);
        doc.rect(0,0,W,28,'F');
        doc.setFillColor(0,31,77);
        doc.rect(0,28,W,4,'F');

        try{ doc.addImage(LOGO_B64,'PNG',mg,4,20,12,'logosec','FAST'); }catch(e){}
        doc.setFontSize(18);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');
        doc.text(cat,W/2,18,{align:'center'});
        doc.setFontSize(9);doc.setTextColor(220,240,255);doc.setFont('helvetica','normal');
        doc.text(`${grupos[cat].length} produto(s)`,W/2,24,{align:'center'});

        y=40;

        grupos[cat].forEach((p,i)=>{
          const cardH = 52;
          const fotoW = p.foto ? 22 : 0;
          if(y+cardH>H-18){novaPage();y=14;}

          // fundo alternado
          if(i%2===0){doc.setFillColor(248,250,255);doc.rect(mg,y-4,W-mg*2,cardH,'F');}

          // barra lateral colorida
          doc.setFillColor(r,g,b);
          doc.rect(mg,y-4,3,cardH,'F');

          // foto (se existir)
          if(p.foto){
            try{
              doc.addImage(p.foto,'JPEG',mg+5,y-2,18,18,'','FAST');
            }catch(err){}
          }

          const xBase = mg + 7 + fotoW;

          // nome do produto
          doc.setFontSize(11);doc.setTextColor(20,30,60);doc.setFont('helvetica','bold');
          doc.text(p.nome||'',xBase,y+4);

          // linha divisória leve
          doc.setDrawColor(r,g,b);doc.setLineWidth(0.2);
          doc.line(xBase,y+6,W-mg,y+6);

          let yc=y+13;
          doc.setFont('helvetica','normal');

          if(p.embalagem){
            doc.setFontSize(7.5);doc.setTextColor(r,g,b);doc.setFont('helvetica','bold');
            doc.text('EMBALAGEM',xBase,yc);
            doc.setFontSize(9);doc.setTextColor(50,50,60);doc.setFont('helvetica','normal');
            doc.text(p.embalagem,xBase+28,yc);
            yc+=7;
          }
          if(p.diluicao){
            doc.setFontSize(7.5);doc.setTextColor(r,g,b);doc.setFont('helvetica','bold');
            doc.text('DILUIÇÃO',xBase,yc);
            doc.setFontSize(9);doc.setTextColor(50,50,60);doc.setFont('helvetica','normal');
            doc.text(p.diluicao,xBase+28,yc);
            yc+=7;
          }
          if(p.aplicacao){
            doc.setFontSize(7.5);doc.setTextColor(r,g,b);doc.setFont('helvetica','bold');
            doc.text('APLICAÇÃO',xBase,yc);
            doc.setFontSize(8.5);doc.setTextColor(50,50,60);doc.setFont('helvetica','normal');
            const linhas=doc.splitTextToSize(p.aplicacao,W-mg*2-xBase+mg-4);
            doc.text(linhas.slice(0,2),xBase+28,yc);
          }

          y+=cardH+4;
        });
      });

      // numeração de páginas retroativa na capa
      const total=doc.getNumberOfPages();
      doc.setPage(1);
      doc.setFontSize(9);doc.setTextColor(80,120,180);
      doc.text(`${total-1} página(s) de produtos`,mg+10,H-16);

      // salvar
      const nomeArq=`catalogo-ab-chemicals-${sel==='todos'?'completo':sel.toLowerCase()}.pdf`;
      doc.save(nomeArq);
      showToast('PDF gerado com sucesso!');
      fecharPdfModal();
    }catch(e){showToast('Erro ao gerar PDF: '+e.message,'error');}
    btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Baixar PDF';
    btn.disabled=false;
  },100);
};

carregar();
</script>
